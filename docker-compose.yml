version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: techgram-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: techgram
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: techgram-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  postgres_data:
  redis_data:
